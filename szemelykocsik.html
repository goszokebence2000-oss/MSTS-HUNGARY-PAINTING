<!DOCTYPE html>
<html lang="hu">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Személykocsik</title>

    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-image: url('img/szemelykocsik.jpeg');
            background-size: cover;
            background-position: center;
            background-attachment: fixed;
            color: #000;
            display: flex;
            flex-direction: column;
            min-height: 100vh;
        }

        /* Felső rész */
        .felso {
            background-color: rgba(51, 51, 51, 0.8);
            border-radius: 0 0 10px 10px;
            padding: 10px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.4);
        }

        .felso h1 {
            color: yellow;
            text-align: center;
            margin: 0;
        }

        /* Navigáció */
        #ulb {
            list-style-type: none;
            padding: 0;
            margin: 10px 0 0 0;
            display: flex;
            justify-content: center;
            flex-wrap: wrap;
        }

        .lib {
            margin: 5px;
            position: relative;
        }

        .lib a {
            text-decoration: none;
            color: white;
            padding: 8px 12px;
            display: block;
            background-color: #555;
            border-radius: 8px;
            transition: background-color 0.3s;
            white-space: nowrap;
        }

        .lib a:hover {
            background-color: #777;
        }

        /* ===== DROPDOWN MENÜ ===== */
        .dropdown-menu {
            display: none;
            position: absolute;
            top: 100%;
            left: 0;
            background-color: #555;
            border-radius: 8px;
            min-width: 220px;
            padding: 5px 0;
            box-shadow: 0 4px 10px rgba(0,0,0,0.5);
            z-index: 1000;
        }

        .dropdown-menu li {
            margin: 0;
        }

        .dropdown-menu li a {
            border-radius: 0;
        }

        .dropdown:hover .dropdown-menu {
            display: block;
        }

        /* Tartalom */
        .content {
            flex: 1;
            padding: 20px;
        }

        .download-link {
            display: inline-block;
            text-decoration: underline;
            color: blue;
            cursor: pointer;
        }

        .counter {
            font-weight: bold;
            margin-top: 5px;
            color: black;
        }

        /* Reszponzív */
        @media (max-width: 600px) {
            .felso h1 {
                font-size: 1.5em;
            }

            #ulb {
                flex-direction: column;
                align-items: center;
            }

            .lib a {
                width: 80%;
                text-align: center;
            }
        }
    </style>
</head>
<body>

<div class="felso">
    <h1>Személykocsik</h1>
    <ul id="ulb">
        <li class="lib"><a href="https://goszokebence2000-oss.github.io/magyartsmstsopenrails/index.html">Főoldal</a></li>
        <li class="lib"><a href="https://goszokebence2000-oss.github.io/magyartsmstsopenrails/feladatok.html">Feladatok,Activity</a></li>
        <li class="lib dropdown">
            <a href="">Járműpark</a>
            <ul class="dropdown-menu">
                <li><a href="https://goszokebence2000-oss.github.io/magyartsmstsopenrails/villanymozdony.html">Villanymozdony</a></li>
                <li><a href="https://goszokebence2000-oss.github.io/magyartsmstsopenrails/dizelmozdony.html">Dízelmozdony</a></li>
                <li><a href="">Motorvonat (villamos)</a></li>
                <li><a href="https://goszokebence2000-oss.github.io/magyartsmstsopenrails/dizelmozdony.html">Motorvonat (dízel)</a></li>
                <li><a class="active" href="https://goszokebence2000-oss.github.io/magyartsmstsopenrails/szemelykocsik.html">Személykocsik</a></li>
            </ul>
        </li>
        <li class="lib"><a href="#">sound</a></li>
        <li class="lib"><a href="#">kijelzo</a></li>
        <li class="lib"><a href="#">Hamarosan ki fogom adni</a></li>
        <li class="lib"><a href="#">Szabályzat</a></li>
    </ul>
</div>

<div class="content">
    <p>BDt-400 3G festéssel</p>
    <a href="https://drive.google.com/file/d/1xPFW6GhCb8fJjCexYxYJkV9Xcn2UmolM/view?usp=sharing"
       target="_blank"
       class="download-link"
       data-counter="BDt-400">
        <img src="képet ide kell betalózni" alt="BDt-400 3G festés">
    </a>
    <p id="BDt-400-counter" class="counter">0 letöltés</p>

    <!-- Itt adhatsz hozzá további fájlokat ugyanígy -->
</div>

<!-- Firebase SDK -->
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

<script>
  // Firebase konfiguráció
  const firebaseConfig = {
    apiKey: "IDE_JÖN", // cseréld a barátod Firebase kulcsaira
    authDomain: "PROJECT_ID.firebaseapp.com",
    databaseURL: "https://mmphletoltesszamlalo-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "PROJECT_ID",
    storageBucket: "PROJECT_ID.appspot.com",
    messagingSenderId: "SENDER_ID",
    appId: "APP_ID"
  };

  // Firebase inicializálás
  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  // Letöltés számlálók
  const links = document.querySelectorAll('.download-link');

  links.forEach(link => {
    const counterId = link.dataset.counter;
    const counterRef = db.ref('bence/' + counterId);

    // Ha még nincs adat, hozzuk létre 0-val
    counterRef.once('value').then(snapshot => {
      if (snapshot.val() === null) counterRef.set(0);
    });

    // Valós idejű frissítés
    counterRef.on('value', snapshot => {
      const val = snapshot.val() || 0;
      const counterElem = document.getElementById(counterId + '-counter');
      if (counterElem) counterElem.textContent = val + " letöltés";
    });

    // Kattintásnál növelje a számlálót
    link.addEventListener('click', () => {
      counterRef.transaction(current => (current || 0) + 1);
    });
  });
</script>

</body>
</html>
