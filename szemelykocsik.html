<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Személykocsik</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background-image: url('img/szemelykocsik.jpeg');
  background-size: cover;
  background-position: center;
  background-attachment: fixed;
  color: #000;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

.felso {
  background-color: rgba(51, 51, 51, 0.8);
  border-radius: 0 0 10px 10px;
  padding: 10px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.4);
}

.felso h1 {
  color: yellow;
  text-align: center;
  margin: 0;
}

#ulb {
  list-style-type: none;
  padding: 0;
  margin: 10px 0 0 0;
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
}

.lib {
  margin: 5px;
  position: relative;
}

.lib a {
  text-decoration: none;
  color: white;
  padding: 8px 12px;
  display: block;
  background-color: #555;
  border-radius: 8px;
}

.lib a:hover {
  background-color: #777;
}

.dropdown-menu {
  display: none;
  position: absolute;
  top: 100%;
  left: 0;
  background-color: #555;
  border-radius: 8px;
  min-width: 220px;
  padding: 5px 0;
  z-index: 1000;
}

.dropdown:hover .dropdown-menu {
  display: block;
}

.content {
  flex: 1;
  padding: 20px;
}

.download-link img {
  width: 300px;
  cursor: pointer;
  display: block;
  border: 2px solid transparent;
  transition: border 0.3s;
}

.download-link img:hover {
  border: 2px solid yellow;
}

.counter {
  font-weight: bold;
  margin-top: 5px;
  color: black;
  background-color: rgba(255, 255, 255, 0.6);
  display: inline-block;
  padding: 2px 8px;
  border-radius: 4px;
}
</style>
</head>

<body>

<div class="felso">
  <h1>Személykocsik</h1>
  <ul id="ulb">
    <li class="lib"><a href="index.html">Főoldal</a></li>
    <li class="lib"><a href="feladatok.html">Feladatok, Activity</a></li>

    <li class="lib dropdown">
      <a href="#">Járműpark</a>
      <ul class="dropdown-menu">
        <li><a href="villanymozdony.html">Villanymozdony</a></li>
        <li><a href="dizelmozdony.html">Dízelmozdony</a></li>
        <li><a href="villanymotorvonat.html">Motorvonat (villamos)</a></li>
        <li><a href="dizelmotorvonat.html">Motorvonat (dízel)</a></li>
        <li><a href="szemelykocsik.html">Személykocsik</a></li>
      </ul>
    </li>

    <li class="lib"><a href="#">sound</a></li>
    <li class="lib"><a href="#">kijelzo</a></li>
    <li class="lib"><a href="#">Hamarosan</a></li>
    <li class="lib"><a href="#">Szabályzat</a></li>
  </ul>
</div>

<div class="content">
  <p>BDt-400 3G festéssel</p>

  <a
    href="https://drive.google.com/file/d/1xPFW6GhCb8fJjCexYxYJkV9Xcn2UmolM/view"
    target="_blank"
    class="download-link"
    data-counter="bdt_400">
    <img src="img/BDt-400.png" alt="BDt-400">
  </a>

  <p id="bdt_400-counter" class="counter">Betöltés...</p>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

<script>
  // A szemelykocsik.html SAJÁT adatbázis konfigurációja
  const firebaseConfig = {
    apiKey: "IDE_A_SAJÁT_API_KEY", 
    authDomain: "mmphletoltesszamlalo.firebaseapp.com",
    databaseURL: "https://mmphletoltesszamlalo-default-rtdb.europe-west1.firebasedatabase.app",
    projectId: "mmphletoltesszamlalo",
    storageBucket: "mmphletoltesszamlalo.appspot.com",
    messagingSenderId: "SAJAT_SENDER_ID",
    appId: "SAJAT_APP_ID"
  };

  // Inicializálás
  firebase.initializeApp(firebaseConfig);
  const db = firebase.database();

  // Számlálók kezelése a vonat.html logikája alapján
  const downloadLinks = document.querySelectorAll('.download-link');

  downloadLinks.forEach(link => {
    const counterId = link.dataset.counter;
    // Figyelem: Itt a gyökérben keressük az adatot (mint az eredetiben)
    const counterRef = db.ref(counterId);

    // 1. Alapértelmezett érték ellenőrzése (ha még nem létezne)
    counterRef.once('value').then(snap => {
      if (snap.val() === null) {
        counterRef.set(0);
      }
    });

    // 2. Valós idejű figyelés (ha bárki kattint, mindenkinél frissül)
    counterRef.on('value', snap => {
      const currentCount = snap.val() || 0;
      const displayElem = document.getElementById(counterId + '-counter');
      if (displayElem) {
        displayElem.textContent = currentCount + " letöltés";
      }
    });

    // 3. Kattintás esemény (Tranzakció használata az ütközések elkerülésére)
    link.addEventListener('click', () => {
      counterRef.transaction(currentValue => {
        return (currentValue || 0) + 1;
      });
    });
  });
</script>

</body>
</html>
