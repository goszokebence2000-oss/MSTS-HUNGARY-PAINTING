<!DOCTYPE html>
<html lang="hu">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Személykocsik</title>

<style>
body {
  margin: 0;
  font-family: Arial, sans-serif;
  background-image: url('img/szemelykocsik.jpeg');
  background-size: cover;
  background-position: center;
  background-attachment: fixed;
  color: #000;
  display: flex;
  flex-direction: column;
  min-height: 100vh;
}

.felso {
  background-color: rgba(51, 51, 51, 0.8);
  border-radius: 0 0 10px 10px;
  padding: 10px;
  box-shadow: 0 2px 8px rgba(0,0,0,0.4);
}

.felso h1 {
  color: yellow;
  text-align: center;
  margin: 0;
}

#ulb {
  list-style-type: none;
  padding: 0;
  margin: 10px 0 0 0;
  display: flex;
  justify-content: center;
  flex-wrap: wrap;
}

.lib {
  margin: 5px;
  position: relative;
}

.lib a {
  text-decoration: none;
  color: white;
  padding: 8px 12px;
  display: block;
  background-color: #555;
  border-radius: 8px;
}

.lib a:hover {
  background-color: #777;
}

.dropdown-menu {
  display: none;
  position: absolute;
  top: 100%;
  left: 0;
  background-color: #555;
  border-radius: 8px;
  min-width: 220px;
  padding: 5px 0;
  z-index: 1000;
}

.dropdown:hover .dropdown-menu {
  display: block;
}

.content {
  flex: 1;
  padding: 20px;
}

.download-link img {
  width: 300px;
  cursor: pointer;
  display: block;
}

.counter {
  font-weight: bold;
  margin-top: 5px;
  color: black;
  background: rgba(255,255,255,0.7);
  display: inline-block;
  padding: 2px 5px;
}
</style>
</head>

<body>

<div class="felso">
  <h1>Személykocsik</h1>
  <ul id="ulb">
    <li class="lib"><a href="https://goszokebence2000-oss.github.io/MSTS-HUNGARY-FESTÉSZET/index.html">Főoldal</a></li>
    <li class="lib"><a href="https://goszokebence2000-oss.github.io/MSTS-HUNGARY-FESTÉSZET/feladatok.html">Feladatok, Activity</a></li>

    <li class="lib dropdown">
      <a href="#">Járműpark</a>
      <ul class="dropdown-menu">
        <li><a href="https://goszokebence2000-oss.github.io/MSTS-HUNGARY-PAINTING/villanymozdony.html">Villanymozdony</a></li>
        <li><a href="https://goszokebence2000-oss.github.io/MSTS-HUNGARY-PAINTING/dizelmozdony.html">Dízelmozdony</a></li>
        <li><a href="https://goszokebence2000-oss.github.io/MSTS-HUNGARY-PAINTING/villanymotorvonat.html">Motorvonat (villamos)</a></li>
        <li><a href="https://goszokebence2000-oss.github.io/MSTS-HUNGARY-PAINTING/dizelmotorvonat.html">Motorvonat (dízel)</a></li>
        <li><a href="https://goszokebence2000-oss.github.io/MSTS-HUNGARY-PAINTING/szemelykocsik.html">Személykocsik</a></li>
      </ul>
    </li>

    <li class="lib"><a href="https://goszokebence2000-oss.github.io/MSTS-HUNGARY-PAINTING/index.html">sound</a></li>
    <li class="lib"><a href="https://goszokebence2000-oss.github.io/MSTS-HUNGARY-PAINTING/index.html">kijelzo</a></li>
    <li class="lib"><a href="https://goszokebence2000-oss.github.io/MSTS-HUNGARY-PAINTING/hkfa.html">Hamarosan</a></li>
    <li class="lib"><a href="https://goszokebence2000-oss.github.io/MSTS-HUNGARY-PAINTING/index.html">Szabályzat</a></li>
  </ul>
</div>

<div class="content">
  <p>BDt-400 3G festéssel</p>

  <a
    href="https://drive.google.com/file/d/1xPFW6GhCb8fJjCexYxYJkV9Xcn2UmolM/view"
    target="_blank"
    class="download-link"
    data-counter="bdt_400">
    <img src="img/BDt-400.png" alt="BDt-400">
  </a>

  <p id="bdt_400-counter" class="counter">0 letöltés</p>
</div>

<div class="content">
  <p color="white">Bbdpmz</p>

  <a href="https://cdn.fbsbx.com/v/t59.2708-21/650726025_5184673771756793_5538375965871226214_n.zip/IC-Bbdpmz.zip?_nc_cat=104&ccb=1-7&_nc_sid=2b0e22&_nc_ohc=_8TBVO7Yr1gQ7kNvwE3oT7U&_nc_oc=AdnLKHr9Og3AU-rC0qSg51WNtx9hzdTxV6kQxG6sxzcznHJdcjjPvIbmYzbNR0FkfNJgLk_A1Awn0oD1bB1-uqP6&_nc_zt=7&_nc_ht=cdn.fbsbx.com&_nc_gid=jhhdYlp_AX3MATD62lU7bA&_nc_ss=1a&oh=03_Q7cD4wEWVQeSCIH_hSJficzEe4agxOcGFc66kL9u8uCsZ6RXYw&oe=69BA2B73&dl=1" target="_blank"
    class="download-link"
    data-counter="bbdpmz">
    <img src="img/bbdpmz.jpg" alt="Bbdpmz">
  </a>

  <p id="bbdpmz-counter" color="white" class="counter">0 letöltés</p>
</div>

<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/9.22.1/firebase-database-compat.js"></script>

<script>
// FIGYELEM: Az apiKey-t és az AppId-t ki kell másolnod a Firebase konzolból!
const firebaseConfig = {
  apiKey: "IDE_MÁSOLD_BE_A_KULCSOT",
  authDomain: "mmphletoltesszamlalo.firebaseapp.com",
  databaseURL: "https://mmphletoltesszamlalo-default-rtdb.europe-west1.firebasedatabase.app",
  projectId: "mmphletoltesszamlalo",
  storageBucket: "mmphletoltesszamlalo.appspot.com",
  messagingSenderId: "367280386762", // Példa ID
  appId: "1:367280386762:web:a6f5..." // Példa ID
};

firebase.initializeApp(firebaseConfig);
const db = firebase.database();

const links = document.querySelectorAll('.download-link');

links.forEach(link => {
  const id = link.dataset.counter;
  const ref = db.ref(id); 

  // Valós idejű frissítés
  ref.on('value', snap => {
    const val = snap.val() || 0;
    const counterElem = document.getElementById(id + '-counter');
    if(counterElem) counterElem.textContent = val + ' letöltés';
  }, error => {
    console.error("Firebase hiba:", error);
  });

  // Kattintás számlálás
  link.addEventListener('click', () => {
    ref.transaction(current => (current || 0) + 1);
  });
});
</script>

</body>
</html>
